name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: v2.9.9

      - uses: actions/cache@v6
        with:
          path: ~/AppData/Local/.xmake
          key: xmake-1.9.9-vs2022-x29-${{ hashFiles('xmake.lua') }}
          restore-keys: |
            xmake-1.9.9-vs2022-x29-

      - run: xmake repo -u

      # 强制 VS2022：levilamina 1.9.9 的传递依赖(zlib/libcurl)在 VS2026 下会源码编译且
      # 产出 zlib.lib 失败。锁 xmake v2.9.9（不认识 VS2026）使其只能选 VS2022，命中预编译包。
      - run: xmake f -a x64 -m release -p windows -v --vs=2022 --target_type=server -y

      - run: xmake -v -y

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-${{ github.sha }}-server-windows-x64
          path: bin/
