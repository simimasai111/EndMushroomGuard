name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v7

      - uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: v2.9.9

      - uses: actions/cache@v6
        with:
          path: ~/AppData/Local/.xmake
          key: xmake-1.9.9-win2022-${{ hashFiles('xmake.lua') }}
          restore-keys: |
            xmake-1.9.9-win2022-

      - run: xmake repo -u

      # windows-2022 自带干净的 VS2022（无 VS2026），让 xmake 自动探测即可。
      # 切勿在 windows-latest(Server 2025) 上构建——那里默认 VS2026 会让 xmake v2.9.9
      # 探测失败报 “vs not found!”，且 zlib/libcurl 在 VS2026 下会源码编译缺 .lib。
      - run: xmake f -a x64 -m release -p windows -v --target_type=server -y

      - run: xmake -v -y

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-${{ github.sha }}-server-windows-x64
          path: bin/
