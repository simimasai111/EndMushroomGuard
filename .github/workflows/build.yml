name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v7

      - uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: branch@master

      - uses: actions/cache@v6
        with:
          path: ~/AppData/Local/.xmake
          key: xmake-1.9.9-win2022-master-${{ hashFiles('xmake.lua') }}
          restore-keys: |
            xmake-1.9.9-win2022-master-

      - run: xmake repo -u

      # levilamina 1.9.9 的包构建要求 xmake >= 3.0.0，故必须用 branch@master（3.x）。
      # 且必须在 windows-2022 上构建：该镜像只含干净的 VS2022（无 VS2026）。
      # 在 windows-latest(Server 2025) 上 xmake 会探测到 VS2026，导致 zlib/libcurl 源码编译缺 .lib。
      - run: xmake f -a x64 -m release -p windows -v --target_type=server -y

      - run: xmake -v -y

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ github.event.repository.name }}-${{ github.sha }}-server-windows-x64
          path: bin/
